name: Simple Release

on:
  push:
    tags:
      - v*.*.*

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: crush-linux-amd64.tar.gz
            binary: crush-linux-amd64
          - goos: darwin
            goarch: amd64
            artifact: crush-darwin-amd64.tar.gz
            binary: crush-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: crush-darwin-arm64.tar.gz
            binary: crush-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact: crush-windows-amd64.zip
            binary: crush-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o ${{ matrix.binary }} -trimpath \
            -ldflags="-s -w -X github.com/charmbracelet/crush/internal/version.Version=${VERSION} -X github.com/charmbracelet/crush/internal/update.GitHubRepo=${REPO}" .
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip ${{ matrix.artifact }} ${{ matrix.binary }} README.md
          else
            tar -czf ${{ matrix.artifact }} ${{ matrix.binary }} README.md
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/linux-amd64/crush-linux-amd64.tar.gz
            release-artifacts/darwin-amd64/crush-darwin-amd64.tar.gz
            release-artifacts/darwin-arm64/crush-darwin-arm64.tar.gz
            release-artifacts/windows-amd64/crush-windows-amd64.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
